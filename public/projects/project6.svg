<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ecoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#84cc16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="deviceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b7280;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="earthGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#ecoGradient)"/>
  
  <!-- Earth/Globe -->
  <circle cx="120" cy="100" r="40" fill="url(#earthGradient)" opacity="0.9"/>
  <path d="M90 100 Q120 80 150 100 Q120 120 90 100" fill="#064e3b" opacity="0.7"/>
  <path d="M100 85 Q130 75 140 95" fill="#064e3b" opacity="0.7"/>
  <path d="M105 110 Q125 105 145 115" fill="#064e3b" opacity="0.7"/>
  
  <!-- Electronic devices (laptop, phone, tablet) -->
  <rect x="200" y="80" width="45" height="30" rx="3" fill="url(#deviceGradient)"/>
  <rect x="205" y="85" width="35" height="20" rx="1" fill="#1f2937"/>
  <rect x="207" y="87" width="31" height="16" fill="#3b82f6" opacity="0.3"/>
  
  <rect x="260" y="90" width="20" height="35" rx="3" fill="url(#deviceGradient)"/>
  <rect x="263" y="93" width="14" height="20" rx="1" fill="#1f2937"/>
  <circle cx="270" cy="120" r="3" fill="#4b5563"/>
  
  <rect x="290" y="85" width="35" height="25" rx="2" fill="url(#deviceGradient)"/>
  <rect x="293" y="88" width="29" height="19" rx="1" fill="#1f2937"/>
  
  <!-- Recycling symbol -->
  <g transform="translate(320, 60)">
    <path d="M0 20 L10 0 L20 20 L15 20 L10 10 L5 20 Z" fill="#22c55e"/>
    <path d="M20 20 L30 0 L40 20 L35 20 L30 10 L25 20 Z" fill="#22c55e" transform="rotate(120 20 10)"/>
    <path d="M40 20 L50 0 L60 20 L55 20 L50 10 L45 20 Z" fill="#22c55e" transform="rotate(240 20 10)"/>
  </g>
  
  <!-- Green leaves/nature elements -->
  <g transform="translate(50, 160)">
    <ellipse cx="0" cy="0" rx="15" ry="8" fill="url(#leafGradient)" transform="rotate(-30)"/>
    <ellipse cx="20" cy="5" rx="12" ry="6" fill="url(#leafGradient)" transform="rotate(20)"/>
    <ellipse cx="10" cy="20" rx="10" ry="5" fill="url(#leafGradient)" transform="rotate(-45)"/>
  </g>
  
  <!-- Green technology circuit pattern -->
  <g transform="translate(150, 180)" opacity="0.6">
    <circle cx="0" cy="0" r="3" fill="#22c55e"/>
    <circle cx="30" cy="10" r="3" fill="#22c55e"/>
    <circle cx="60" cy="5" r="3" fill="#22c55e"/>
    <circle cx="90" cy="15" r="3" fill="#22c55e"/>
    <line x1="3" y1="0" x2="27" y2="10" stroke="#22c55e" stroke-width="2"/>
    <line x1="33" y1="10" x2="57" y2="5" stroke="#22c55e" stroke-width="2"/>
    <line x1="63" y1="5" x2="87" y2="15" stroke="#22c55e" stroke-width="2"/>
    
    <circle cx="15" cy="25" r="3" fill="#16a34a"/>
    <circle cx="45" cy="30" r="3" fill="#16a34a"/>
    <circle cx="75" cy="25" r="3" fill="#16a34a"/>
    <line x1="3" y1="3" x2="15" y2="22" stroke="#16a34a" stroke-width="2"/>
    <line x1="30" y1="13" x2="45" y2="27" stroke="#16a34a" stroke-width="2"/>
    <line x1="60" y1="8" x2="75" y2="22" stroke="#16a34a" stroke-width="2"/>
  </g>
  
  <!-- Title text -->
  <text x="200" y="250" text-anchor="middle" fill="white" font-size="24" font-weight="bold" font-family="Arial, sans-serif">ECO TECH</text>
  <text x="200" y="270" text-anchor="middle" fill="#d1fae5" font-size="12" font-family="Arial, sans-serif">E-Waste Awareness Platform</text>
  
  <!-- Decorative elements -->
  <circle cx="350" cy="200" r="20" fill="#22c55e" opacity="0.3"/>
  <circle cx="340" cy="180" r="8" fill="#16a34a" opacity="0.4"/>
  <circle cx="365" cy="190" r="5" fill="#84cc16" opacity="0.5"/>
  
  <circle cx="50" cy="250" r="15" fill="#22c55e" opacity="0.2"/>
  <circle cx="30" cy="240" r="6" fill="#16a34a" opacity="0.3"/>
  
</svg>
